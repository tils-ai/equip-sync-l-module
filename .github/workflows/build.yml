name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: watcher

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install poppler via MSYS2
        id: poppler
        shell: pwsh
        working-directory: .
        run: |
          C:\msys64\usr\bin\pacman.exe -S --noconfirm mingw-w64-x86_64-poppler
          $popplerBin = "C:\msys64\mingw64\bin"
          if (-not (Test-Path "$popplerBin\pdftoppm.exe")) {
            Write-Error "pdftoppm.exe not found in $popplerBin"
            exit 1
          }
          echo "bin=$popplerBin" >> $env:GITHUB_OUTPUT

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build exe
        run: pyinstaller --onefile --windowed --hidden-import=win32print --hidden-import=win32ui --hidden-import=win32api --collect-all customtkinter --collect-submodules watcher --add-data "${{ steps.poppler.outputs.bin }};poppler" --add-data "assets/fonts;assets/fonts" --name equip-sync-l main.py

      - name: Rename artifact (버전 포함)
        shell: pwsh
        run: |
          $name = "equip-sync-l-${{ github.ref_name }}.exe"
          Rename-Item -Path "dist/equip-sync-l.exe" -NewName $name
          echo "ARTIFACT=watcher/dist/$name" >> $env:GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.3.2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            GUIDE.txt
            ${{ env.ARTIFACT }}
