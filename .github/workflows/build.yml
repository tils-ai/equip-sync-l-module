name: Build Windows EXE

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build label-printer (watcher+agent 통합)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: watcher

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install poppler via MSYS2
        id: poppler
        run: |
          C:\msys64\usr\bin\pacman.exe -S --noconfirm mingw-w64-x86_64-poppler
          $popplerBin = "C:\msys64\mingw64\bin"
          if (-not (Test-Path "$popplerBin\pdftoppm.exe")) {
            Write-Error "pdftoppm.exe not found in $popplerBin"
            exit 1
          }
          echo "bin=$popplerBin" >> $env:GITHUB_OUTPUT
          echo "Poppler bin: $popplerBin"
        shell: pwsh
        working-directory: .

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build EXE (label-printer.exe)
        run: pyinstaller --onefile --name label-printer --windowed --hidden-import win32print --hidden-import win32ui --hidden-import win32api --collect-data customtkinter --collect-submodules gui --add-data "${{ steps.poppler.outputs.bin }};poppler" --add-data "assets/fonts;assets/fonts" main.py

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: label-printer
          path: watcher/dist/label-printer.exe

  release:
    name: Upload to Release
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: label-printer
          path: release

      - name: Upload to Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.3.2
        with:
          files: |
            GUIDE.txt
            release/*
